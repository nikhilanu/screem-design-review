<meta name="description" content="screem home variation 20 — radical calm: one thing at a time." />
<style>
/* ════ screem home · 20 — Zen ════
   Radical calm. One card, one task, one button. */
@font-face { font-family: "Inter"; src: url("../fonts/inter-Regular.woff2") format("woff2"); font-weight: 400; font-display: swap; }
@font-face { font-family: "Inter"; src: url("../fonts/inter-500.woff2") format("woff2"); font-weight: 500; font-display: swap; }
@font-face { font-family: "Inter"; src: url("../fonts/inter-600.woff2") format("woff2"); font-weight: 600; font-display: swap; }
@font-face { font-family: "Inter"; src: url("../fonts/inter-700.woff2") format("woff2"); font-weight: 700; font-display: swap; }
@font-face { font-family: "Arcadia"; src: url("../fonts/arcadia-360.woff2") format("woff2"); font-weight: 360; font-display: swap; }
@font-face { font-family: "ArcadiaDisplay"; src: url("../fonts/arcadiaDisplay-320.woff2") format("woff2"); font-weight: 320; font-display: swap; }
@font-face { font-family: "JetBrains Mono"; src: url("../fonts/JetBrainsMono-Regular.ttf") format("truetype"); font-weight: 400; font-display: swap; }
@font-face { font-family: "JetBrains Mono"; src: url("../fonts/JetBrainsMono-Medium.ttf") format("truetype"); font-weight: 500; font-display: swap; }

:root {
  --paper: #faf8f1;
  --raised: #fffefa;
  --sunken: #f1eee1;
  --ink: #000000;
  --ink-body: #211e15;
  --ink-soft: #4c473a;
  --muted: #6f6a5a;
  --faint: #a19a86;
  --line-subtle: #ece8d9;
  --line-weak: #e1dcc9;
  --line-mid: #cec7af;
  --purple: #7d39eb;
  --purple-deep: #5a1fbc;
  --purple-soft: #f0e9fd;
  --purple-tint: #c9a6f7;
  --lime: #bfff1f;
  --lime-deep: #44610a;
  --lime-soft: #f1fbd2;
  --lime-tint: #dcf584;
  --orange: #ed621d;
  --orange-deep: #b8480e;
  --orange-soft: #fcead9;
  --orange-tint: #f6ac7b;
  --font-sans: "Inter", -apple-system, "Segoe UI", sans-serif;
  --font-display: "ArcadiaDisplay", "Arcadia", Georgia, serif;
  --font-sub: "Arcadia", Georgia, serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  --card-shadow: 0 1px 3px #0000000a, 0 0 2px #1c140028;
  --ease-out-cubic: cubic-bezier(.33, 1, .68, 1);
  --ease-emphasized: cubic-bezier(.2, 0, 0, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--paper); color: var(--ink-body); font-size: 15.5px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
::selection { background: var(--lime); color: var(--ink); }
a, button { transition: color .3s var(--ease-emphasized), background-color .3s var(--ease-emphasized), border-color .3s var(--ease-emphasized); }
a:hover, button:hover { transition-duration: .05s; }
a:focus-visible, button:focus-visible { outline: 1.5px solid var(--purple); outline-offset: 2px; border-radius: 6px; }

.rise { opacity: 0; transform: translateY(14px); animation: rise .7s var(--ease-out-cubic) forwards; }
@keyframes rise { to { opacity: 1; transform: none; } }
.rise.d1 { animation-delay: .07s; } .rise.d2 { animation-delay: .14s; } .rise.d3 { animation-delay: .21s; }

.var-chip { position: fixed; right: 18px; bottom: 18px; z-index: 999; background: var(--ink); color: var(--lime); font-family: var(--font-mono); font-size: 12px; padding: 8px 15px; border-radius: 100px; letter-spacing: .03em; box-shadow: 0 4px 16px #1c140033; white-space: nowrap; }
.var-chip:hover { background: var(--purple); color: #fff; }

/* chrome — faint brand line */
.top { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 26px 22px 0; }
.top .brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-sub); font-weight: 360; font-size: 19px; color: var(--ink); }
.top .brand svg { width: 15px; height: 17px; color: var(--ink); }
.top .org { font-size: 13px; color: var(--faint); border-left: 1px solid var(--line-weak); padding-left: 12px; }

/* centred zen column */
.zen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 22px 90px; max-width: 640px; margin: 0 auto; width: 100%; }
.verdict-line { font-size: 16px; color: var(--ink-soft); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; text-align: center; }
.verdict-line .q-chip { display: inline-flex; padding: 0 11px; border-radius: 100px; background: var(--lime-soft); color: var(--lime-deep); font-weight: 600; }
.verdict-line .tick { color: var(--lime-deep); font-weight: 600; }

/* the one card */
.stage { width: 100%; margin-top: 26px; position: relative; }
.zcard { background: var(--raised); border: none; border-radius: 22px; padding: 42px 44px 38px; box-shadow: 0 1px 2px #1c140010, 0 8px 30px #1c140012; text-align: left; }
@media (max-width: 560px) { .zcard { padding: 30px 24px; } }
.zcard .eyebrow { font-family: var(--font-mono); font-size: 11.5px; letter-spacing: .09em; text-transform: uppercase; color: var(--orange-deep); display: flex; align-items: center; gap: 9px; }
.zcard .eyebrow i { width: 8px; height: 8px; border-radius: 100%; background: var(--orange); flex: none; }
.zcard .who { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
.zcard .ava { width: 44px; height: 44px; border-radius: 100%; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex: none; }
.ava.o { background: var(--orange-soft); color: var(--orange-deep); }
.ava.p { background: var(--purple-soft); color: var(--purple-deep); }
.zcard .who small { font-size: 13.5px; color: var(--muted); }
.zcard h2 { font-family: var(--font-sub); font-weight: 360; font-size: 29px; letter-spacing: -.012em; line-height: 1.22; color: var(--ink); margin-top: 14px; }
.zcard .why { font-size: 15.5px; color: var(--muted); margin-top: 13px; line-height: 1.65; }
.zcard .row { display: flex; align-items: center; gap: 18px; margin-top: 26px; flex-wrap: wrap; }
.zcard .pill { border: none; background: var(--lime); color: var(--ink); border-radius: 100px; height: 48px; padding: 0 26px; font-size: 15px; font-weight: 600; cursor: pointer; }
.zcard .pill:hover { background: var(--lime-tint); }
.zcard .skip { border: none; background: none; color: var(--faint); font-size: 14px; cursor: pointer; padding: 6px 2px; }
.zcard .skip:hover { color: var(--ink-soft); }

/* final state */
.zcard.done { text-align: center; padding: 52px 40px 46px; }
.zcard.done .big { font-family: var(--font-display); font-weight: 320; font-size: 46px; letter-spacing: -.015em; color: var(--ink); line-height: 1.05; }
.zcard.done .mark { width: 54px; height: 54px; border-radius: 100%; background: var(--ink); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.zcard.done .mark svg { width: 22px; height: 24px; color: var(--lime); }
.zcard.done .after { font-size: 15.5px; color: var(--muted); margin-top: 14px; }
.zcard.done .stats { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 26px; }
.zcard.done .stats span { background: var(--sunken); color: var(--ink-soft); border-radius: 100px; padding: 6px 14px; font-size: 12.5px; font-weight: 500; }

/* compact list mode */
.list-row { display: flex; align-items: center; gap: 14px; padding: 17px 4px; border-bottom: 1px solid var(--line-subtle); text-align: left; }
.list-row:last-of-type { border-bottom: none; }
.list-row .ava { width: 38px; height: 38px; font-size: 12.5px; }
.list-row .grow { flex: 1; min-width: 0; }
.list-row .grow b { display: block; font-size: 15px; font-weight: 600; color: var(--ink); }
.list-row .grow small { display: block; font-size: 13px; color: var(--muted); margin-top: 1px; }
.list-row .mini { border: none; background: var(--lime); color: var(--ink); border-radius: 100px; height: 36px; padding: 0 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex: none; }
.list-row .mini:hover { background: var(--lime-tint); }
.zcard .list-h { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
@media (max-width: 560px) { .list-row { flex-wrap: wrap; } .list-row .mini { margin-left: 52px; } }

/* card transitions */
.stage.slide-out .zcard { opacity: 0; transform: translateX(-22px); transition: opacity .28s var(--ease-emphasized), transform .28s var(--ease-emphasized); }
.stage.slide-in .zcard { opacity: 0; transform: translateX(22px); }
.stage.slide-settle .zcard { opacity: 1; transform: none; transition: opacity .34s var(--ease-out-cubic), transform .34s var(--ease-out-cubic); }

/* dots */
.dots { display: flex; gap: 9px; margin-top: 26px; }
.dots i { width: 9px; height: 9px; border-radius: 100%; background: var(--line-mid); transition: background-color .4s var(--ease-emphasized), transform .4s var(--ease-emphasized); }
.dots i.on { background: var(--ink); transform: scale(1.15); }

.reassure { font-size: 13px; color: var(--faint); margin-top: 24px; text-align: center; }

.alt { margin-top: 40px; }
.alt button { border: none; background: none; color: var(--muted); font-size: 13.5px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--line-mid); padding: 6px; }
.alt button:hover { color: var(--purple-deep); text-decoration-color: var(--purple-tint); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  .rise { opacity: 1; transform: none; }
  .stage.slide-out .zcard, .stage.slide-in .zcard { opacity: 1; transform: none; }
}
</style>
</head>

</header>

<main class="zen">
  <p class="verdict-line rise d1">Your licence is <span class="q-chip">quiet</span> · 52 of 61 in order <span class="tick">✓</span></p>

  <div class="stage rise d2" id="stage" aria-live="polite"></div>

  <div class="dots rise d2" id="dots" aria-hidden="true"><i class="on"></i><i></i><i></i></div>

  <p class="reassure rise d3">Everything else is handled — 412 checks ran at 6:00 this morning, 6 matters being handled for you.</p>

<a class="var-chip" href="index.html">◱ all 20 variations</a>

<script>
const $ = (s, el = document) => el.querySelector(s);
const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;

const STEPS = [
  {
    eyebrow: 'First — about 6 minutes',
    ava: 'o', init: 'MO', who: 'Maria Okafor · Senior Care Assistant',
    title: 'Sign off Maria’s Certificate of Sponsorship (CoS) renewal.',
    why: 'Her visa ends 12 August. The renewal and the salary-change report are already drafted — nothing to write, it just needs your signature.',
    btn: 'Review and sign',
  },
  {
    eyebrow: 'Next — about 3 minutes',
    ava: 'p', init: 'JT', who: 'Jakub Tan · Registered Nurse',
    title: 'Run Jakub’s repeat right-to-work check.',
    why: 'It’s due 15 July. Everything is prepared — you confirm his details and the result writes itself into his record.',
    btn: 'Start check',
  },
  {
    eyebrow: 'Last one — about 4 minutes',
    ava: 'p', init: 'SD', who: 'Sam Devi · Activities Coordinator',
    title: 'Take a look at Sam’s June pay.',
    why: 'He was paid £1,712 against £1,845 contracted. Probably a shift-pattern change — worth a look before payroll closes.',
    btn: 'Take a look',
  },
];

const stage = $('#stage');
const dots = [...$('#dots').children];
const altBtn = $('#alt-toggle');
let step = 0;
let listMode = false;

function stepCard(s) {
  return `
    <section class="zcard">
      <div class="eyebrow"><i></i>${s.eyebrow}</div>
      <div class="who"><span class="ava ${s.ava}">${s.init}</span><small>${s.who}</small></div>
      <h2>${s.title}</h2>
      <p class="why">${s.why}</p>
      <div class="row">
        <button type="button" class="pill" id="do-btn">${s.btn}</button>
        <button type="button" class="skip" id="skip-btn">skip for now →</button>
      </div>
    </section>`;
}

function doneCard() {
  return `
    <section class="zcard done">
      <span class="mark"><svg viewBox="0 0 512 568" aria-hidden="true"><use href="#s-mark"/></svg></span>
      <h2 class="big">That’s everything.</h2>
      <p class="after">Your morning is your own — the next thing due is Jakub’s check on <b>15 July</b>, and it’s already prepared.</p>
      <div class="stats">
        <span>412 checks at 6:00</span>
        <span>163 documents current</span>
        <span>4 of 30 certificates left</span>
        <span>audit-ready 96/100</span>
      </div>
    </section>`;
}

function listCard() {
  const rows = STEPS.map(s => `
    <div class="list-row">
      <span class="ava ${s.ava}">${s.init}</span>
      <span class="grow"><b>${s.title.replace(/\.$/, '')}</b><small>${s.why}</small></span>
      <button type="button" class="mini">${s.btn}</button>
    </div>`).join('');
  return `
    <section class="zcard">
      <div class="list-h">The 3 things — about 15 minutes in all</div>
      ${rows}
    </section>`;
}

function swap(html, after) {
  if (rm) {
    stage.innerHTML = html;
    if (after) after();
    return;
  }
  stage.classList.add('slide-out');
  setTimeout(() => {
    stage.classList.remove('slide-out');
    stage.innerHTML = html;
    stage.classList.add('slide-in');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      stage.classList.add('slide-settle');
      setTimeout(() => stage.classList.remove('slide-in', 'slide-settle'), 380);
    }));
    if (after) after();
  }, 300);
}

function paintDots() {
  dots.forEach((d, i) => d.classList.toggle('on', i <= Math.min(step, 2)));
}

function wireStep() {
  const advance = () => {
    step += 1;
    render();
  };
  const doBtn = $('#do-btn');
  const skipBtn = $('#skip-btn');
  if (doBtn) doBtn.addEventListener('click', advance);
  if (skipBtn) skipBtn.addEventListener('click', advance);
}

function render(first) {
  const html = listMode ? listCard() : (step < STEPS.length ? stepCard(STEPS[step]) : doneCard());
  const after = () => { if (!listMode && step < STEPS.length) wireStep(); };
  if (first) { stage.innerHTML = html; after(); } else { swap(html, after); }
  paintDots();
  $('#dots').style.visibility = listMode ? 'hidden' : 'visible';
  altBtn.textContent = listMode ? 'one thing at a time instead' : 'show everything instead';
}

altBtn.addEventListener('click', () => {
  listMode = !listMode;
  if (listMode === false && step >= STEPS.length) step = STEPS.length; // stay on done
  render();
});

render(true);
</script>
