<style>
/* SCREEM people listing · variation 04 "split pane" — tokens verbatim from dashboard v1.1 */
@font-face { font-family: "Inter"; src: url("../fonts/inter-Regular.woff2") format("woff2"); font-weight: 400; font-display: swap; }
@font-face { font-family: "Inter"; src: url("../fonts/inter-500.woff2") format("woff2"); font-weight: 500; font-display: swap; }
@font-face { font-family: "Inter"; src: url("../fonts/inter-600.woff2") format("woff2"); font-weight: 600; font-display: swap; }
@font-face { font-family: "Inter"; src: url("../fonts/inter-700.woff2") format("woff2"); font-weight: 700; font-display: swap; }
@font-face { font-family: "Arcadia"; src: url("../fonts/arcadia-360.woff2") format("woff2"); font-weight: 360; font-display: swap; }
@font-face { font-family: "ArcadiaDisplay"; src: url("../fonts/arcadiaDisplay-320.woff2") format("woff2"); font-weight: 320; font-display: swap; }
@font-face { font-family: "JetBrains Mono"; src: url("../fonts/JetBrainsMono-Regular.ttf") format("truetype"); font-weight: 400; font-display: swap; }
@font-face { font-family: "JetBrains Mono"; src: url("../fonts/JetBrainsMono-Medium.ttf") format("truetype"); font-weight: 500; font-display: swap; }

:root {
  --paper: #faf8f1; --raised: #fffefa; --sunken: #f1eee1;
  --ink: #000000; --ink-body: #211e15; --ink-soft: #4c473a; --muted: #6f6a5a; --faint: #a19a86;
  --line-subtle: #ece8d9; --line-weak: #e1dcc9; --line-mid: #cec7af;
  --purple: #7d39eb; --purple-deep: #5a1fbc; --purple-soft: #f0e9fd; --purple-tint: #c9a6f7;
  --lime: #bfff1f; --lime-deep: #44610a; --lime-soft: #f1fbd2; --lime-tint: #dcf584;
  --orange: #ed621d; --orange-deep: #b8480e; --orange-soft: #fcead9; --orange-tint: #f6ac7b;
  --font-sans: "Inter", -apple-system, "Segoe UI", sans-serif;
  --font-display: "ArcadiaDisplay", "Arcadia", Georgia, serif;
  --font-sub: "Arcadia", Georgia, serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  --card-shadow: 0 1px 3px #0000000a, 0 0 2px #1c140028;
  --soft-shadow: 0 1px 2px #1c140010, 0 4px 16px #1c14000d;
  --soft-shadow-up: 0 2px 4px #1c140014, 0 8px 24px #1c140014;
  --ease-out-cubic: cubic-bezier(.33, 1, .68, 1);
  --ease-emphasized: cubic-bezier(.2, 0, 0, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--paper); color: var(--ink-body); font-size: 15.5px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
::selection { background: var(--lime); color: var(--ink); }
a, button { transition: color .3s var(--ease-emphasized), background-color .3s var(--ease-emphasized), border-color .3s var(--ease-emphasized), box-shadow .3s var(--ease-emphasized); }
a:hover, button:hover { transition-duration: .05s; }
a:focus-visible, button:focus-visible { outline: 1.5px solid var(--purple); outline-offset: 2px; border-radius: 6px; }
.icon { width: 17px; height: 17px; flex: none; }
.mono { font-family: var(--font-mono); }

/* avatars */
.avatar { border-radius: 100%; flex: none; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; }
.avatar.o { background: var(--orange-soft); color: var(--orange-deep); }
.avatar.p { background: var(--purple-soft); color: var(--purple-deep); }
.avatar.l { background: var(--lime-soft); color: var(--lime-deep); }
.avatar.k { background: var(--ink); color: var(--lime); }

.st { display: inline-flex; align-items: center; gap: 7px; font-weight: 500; font-size: 14.5px; color: var(--ink-soft); white-space: nowrap; }
.st i { width: 8px; height: 8px; border-radius: 100%; flex: none; }
.st.good i { background: var(--lime); box-shadow: inset 0 0 0 1px var(--lime-deep); }
.st.warn i { background: var(--orange-tint); box-shadow: inset 0 0 0 1px var(--orange-deep); }
.st.prog i { background: var(--purple-tint); box-shadow: inset 0 0 0 1px var(--purple-deep); }

/* ── chrome ── */
.bar { display: flex; align-items: center; gap: 13px; height: 62px; padding: 0 30px; border-bottom: 1px solid var(--line-subtle); background: color-mix(in srgb, var(--paper) 94%, transparent); backdrop-filter: blur(8px); flex: none; z-index: 50; }
.brand { display: inline-flex; align-items: center; gap: 9px; font-family: var(--font-sub); font-weight: 360; font-size: 21px; color: var(--ink); }
.brand svg { width: 17px; height: 19px; color: var(--ink); }
.bar .org { font-size: 14.5px; color: var(--muted); white-space: nowrap; }
.bar .org b { color: var(--ink); font-weight: 600; }
.bar .right { margin-left: auto; display: inline-flex; align-items: center; gap: 12px; font-size: 14px; color: var(--muted); white-space: nowrap; }
.bar .avatar { width: 27px; height: 27px; font-size: 11px; }
@media (max-width: 800px) { .bar { padding: 0 16px; } .bar .when { display: none; } }

.var-chip { position: fixed; right: 18px; bottom: 18px; z-index: 99; display: inline-flex; align-items: center; gap: 7px; background: var(--ink); color: var(--lime); border-radius: 100px; padding: 9px 15px; font-family: var(--font-mono); font-size: 12px; letter-spacing: .04em; box-shadow: 0 8px 24px #1c140038; }
.var-chip:hover { background: var(--purple); color: #fff; }

/* ── split shell ── */
.shell { display: flex; height: calc(100vh - 62px); overflow: hidden; }

/* ── left pane ── */
.left { width: 380px; flex: none; display: flex; flex-direction: column; border-right: 1px solid var(--line-subtle); background: var(--paper); }
.left-head { padding: 20px 22px 16px; border-bottom: 1px solid var(--line-subtle); flex: none; }
.left-head h1 { font-family: var(--font-sub); font-weight: 360; font-size: 22px; letter-spacing: -.01em; color: var(--ink); line-height: 1.15; }
.left-head p { font-size: 13.5px; color: var(--muted); margin-top: 3px; }
.left-head p b { color: var(--ink); font-weight: 600; }

.search { position: relative; margin-top: 15px; }
.search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--faint); }
.search input { width: 100%; height: 40px; border: none; background: var(--sunken); border-radius: 100px; padding: 0 16px 0 38px; font-family: var(--font-sans); font-size: 14.5px; color: var(--ink-body); box-shadow: inset 0 0 0 1px transparent; }
.search input::placeholder { color: var(--faint); }
.search input:focus { outline: none; background: var(--raised); box-shadow: inset 0 0 0 1.5px var(--purple-tint); }

.seg { display: flex; gap: 4px; margin-top: 12px; background: var(--sunken); border-radius: 100px; padding: 4px; }
.seg button { flex: 1; height: 34px; border: none; background: transparent; border-radius: 100px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
.seg button .n { font-family: var(--font-mono); font-size: 11.5px; font-weight: 500; opacity: .7; }
.seg button:hover { color: var(--ink-soft); }
.seg button.on { background: var(--raised); color: var(--ink); box-shadow: var(--card-shadow); }

.list { flex: 1; overflow-y: auto; padding: 8px; }
.list::-webkit-scrollbar { width: 9px; }
.list::-webkit-scrollbar-thumb { background: var(--line-weak); border-radius: 10px; border: 3px solid var(--paper); }
.empty { display: none; padding: 30px 20px; text-align: center; color: var(--muted); font-size: 14px; }

.prow { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; border: none; background: transparent; border-radius: 14px; padding: 10px 12px; cursor: pointer; }
.prow:hover { background: var(--raised); box-shadow: var(--card-shadow); }
.prow.sel { background: var(--raised); box-shadow: var(--soft-shadow), inset 0 0 0 1.5px var(--purple-tint); }
.prow .avatar { width: 38px; height: 38px; font-size: 13px; }
.prow-main { flex: 1; min-width: 0; }
.prow-main b { display: block; font-size: 14.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prow-main span { display: block; font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prow-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex: none; }
.prow-right .dot { width: 9px; height: 9px; border-radius: 100%; }
.prow-right .dot.good { background: var(--lime); box-shadow: inset 0 0 0 1px var(--lime-deep); }
.prow-right .dot.warn { background: var(--orange-tint); box-shadow: inset 0 0 0 1px var(--orange-deep); }
.prow-right .dot.prog { background: var(--purple-tint); box-shadow: inset 0 0 0 1px var(--purple-deep); }
.prow-right .pct { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--ink-soft); }

/* ── right pane ── */
.right { flex: 1; min-width: 0; overflow-y: auto; padding: 34px 44px 60px; }
.detail { max-width: 720px; }
.detail-head { display: flex; align-items: center; gap: 18px; }
.detail-head .avatar { width: 66px; height: 66px; font-size: 22px; }
.dh-id { min-width: 0; }
.dh-id h2 { font-family: var(--font-sub); font-weight: 360; font-size: 30px; letter-spacing: -.015em; color: var(--ink); line-height: 1.1; }
.dh-id .role { font-size: 15.5px; color: var(--ink-soft); margin-top: 2px; }
.badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.badge { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 12px; border-radius: 100px; background: var(--sunken); font-size: 13px; font-weight: 500; color: var(--ink-soft); }
.badge.cand { background: var(--purple-soft); color: var(--purple-deep); }

.kind-line { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; font-size: 13px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
.kind-line.emp { color: var(--lime-deep); }
.kind-line.cand { color: var(--purple-deep); }

/* meter */
.meter-card { margin-top: 14px; background: var(--raised); border-radius: 22px; padding: 22px 24px; box-shadow: var(--soft-shadow); }
.meter-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.meter-top .lbl { font-size: 14.5px; color: var(--muted); }
.meter-top .val { font-family: var(--font-sub); font-weight: 360; font-size: 26px; color: var(--ink); }
.meter-top .val span { font-family: var(--font-mono); font-size: 14px; color: var(--muted); margin-left: 6px; font-weight: 500; }
.meter-bar { margin-top: 14px; height: 10px; border-radius: 6px; background: var(--sunken); overflow: hidden; }
.meter-bar i { display: block; height: 100%; border-radius: 6px; background: var(--lime); transition: width .5s var(--ease-out-cubic); }
.meter-bar.prog i { background: linear-gradient(90deg, var(--purple-tint), var(--purple)); }

/* facts */
.d-facts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
.d-fact { background: var(--raised); border-radius: 16px; padding: 15px 18px; box-shadow: var(--card-shadow); }
.d-fact .k { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--faint); }
.d-fact .v { font-size: 15.5px; color: var(--ink); font-weight: 600; margin-top: 4px; }
.d-fact .v.mono { font-family: var(--font-mono); font-weight: 500; font-size: 14.5px; }

/* open item */
.open-card { margin-top: 18px; background: var(--raised); border-radius: 22px; padding: 22px 24px; box-shadow: var(--soft-shadow); }
.open-card.act { box-shadow: var(--soft-shadow), 0 0 0 1.5px var(--orange-tint); }
.open-card .oc-h { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
.open-card.act .oc-h { color: var(--orange-deep); }
.open-card .oc-h svg { width: 15px; height: 15px; }
.open-card p { font-size: 15.5px; color: var(--ink-soft); line-height: 1.55; margin-top: 10px; }
.open-card p b { color: var(--ink); font-weight: 600; }
.oc-foot { display: flex; align-items: center; gap: 14px; margin-top: 16px; flex-wrap: wrap; }
.pill-lime { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 42px; padding: 0 20px; border-radius: 100px; background: var(--lime); color: var(--ink); font-size: 14.5px; font-weight: 600; }
.pill-lime .icon { width: 15px; height: 15px; }
.pill-lime:hover { background: var(--lime-tint); }
.profile-link { display: inline-flex; align-items: center; gap: 7px; font-size: 14.5px; font-weight: 600; color: var(--purple-deep); }
.profile-link .icon { width: 15px; height: 15px; }
.profile-link:hover { color: var(--purple); }

.detail-foot { margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--line-subtle); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ── stack ── */
@media (max-width: 800px) {
  .shell { flex-direction: column; height: auto; overflow: visible; }
  .left { width: 100%; border-right: none; border-bottom: 1px solid var(--line-subtle); }
  .list { max-height: 300px; }
  .right { padding: 26px 18px 80px; }
  .dh-id h2 { font-size: 25px; }
  .d-facts { grid-template-columns: 1fr; }
}
</style>
